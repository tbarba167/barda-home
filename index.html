<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barda Home — Modern Furniture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brown:      #3D1F0D;
  --terra:      #C47A3A;
  --terra-light:#D9944A;
  --teal:       #7AACB5;
  --cream:      #F2E8D9;
  --sand:       #E8DDD0;
  --stone:      #9E8878;
  --muted:      #C4B8AC;
  --white:      #FFFDF9;
  --shadow-sm:  0 2px 8px rgba(61,31,13,0.08);
  --shadow-md:  0 4px 20px rgba(61,31,13,0.12);
  --shadow-lg:  0 8px 32px rgba(61,31,13,0.16);
  --font-d: 'Playfair Display', serif;
  --font-b: 'Mulish', sans-serif;
  --radius-card: 14px;
  --radius-pill: 99px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-b);
  background: #F5F0EA;
  color: var(--brown);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: var(--white);
  border-bottom: 1px solid var(--sand);
  box-shadow: var(--shadow-sm);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  max-width: 1200px; margin: 0 auto;
}
.logo-img { height: 48px; width: auto; object-fit: contain; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.wsp-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 18px;
  background: var(--brown); color: var(--cream);
  font-family: var(--font-b); font-size: 12px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  text-decoration: none; border: none; border-radius: var(--radius-pill);
  cursor: pointer; transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
.wsp-btn:hover { background: var(--terra); }
.wsp-btn:active { transform: scale(0.96); }
.wsp-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── CATEGORY NAV ── */
.cat-nav-outer {
  border-top: 1px solid var(--sand);
  background: var(--white);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-nav-outer::-webkit-scrollbar { display: none; }
.cat-nav {
  display: flex; gap: 2px;
  padding: 0 20px;
  max-width: 1200px; margin: 0 auto;
  width: max-content; min-width: 100%;
}
.cat-pill {
  flex-shrink: 0;
  padding: 12px 18px;
  font-family: var(--font-b); font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  background: none; border: none; cursor: pointer;
  color: var(--stone);
  border-bottom: 2.5px solid transparent;
  margin-bottom: -1px;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.cat-pill:hover { color: var(--brown); }
.cat-pill.active { color: var(--brown); border-bottom-color: var(--terra); }

/* ── STATUS BAR ── */
.status-bar {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 7px 20px;
  background: var(--cream);
  border-bottom: 1px solid var(--sand);
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--stone);
}
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sdot.loading { background: var(--terra); animation: pulse 1s infinite; }
.sdot.ok      { background: #6B8F5E; }
.sdot.error   { background: #C05858; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── HERO ── */
.hero {
  background: var(--white);
  border-bottom: 1px solid var(--sand);
  padding: 32px 20px 28px;
}
.hero-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.hero-text h1 {
  font-family: var(--font-d);
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 800; line-height: 1.1; color: var(--brown);
}
.hero-text h1 em { color: var(--terra); font-style: italic; }
.hero-text p { font-size: 13px; color: var(--stone); margin-top: 8px; line-height: 1.6; }
.hero-stats {
  display: flex; gap: 28px; flex-shrink: 0;
}
.stat { text-align: center; }
.stat-num {
  display: block;
  font-family: var(--font-d); font-size: 32px; font-weight: 700;
  color: var(--brown); line-height: 1;
}
.stat-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* ── ERROR ── */
.error-banner {
  display: none; padding: 12px 20px;
  background: #FEF7ED; border-bottom: 1px solid #F5D87A;
  font-size: 12px; color: #7A5C1E; text-align: center;
}

/* ── MAIN WRAPPER ── */
.main-wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }

/* ── SECTION ── */
.cat-sec { padding-top: 32px; }
.sec-hdr {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
}
.sec-name {
  font-family: var(--font-d);
  font-size: clamp(18px, 3vw, 26px); font-weight: 700; color: var(--brown);
}
.sec-count { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

/* ── GRID — Airbnb style ── */
.prod-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (min-width: 600px)  { .prod-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px)  { .prod-grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1100px) { .prod-grid { grid-template-columns: repeat(5, 1fr); } }

/* ── PRODUCT CARD ── */
.p-card {
  background: var(--white);
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow 0.25s, transform 0.25s;
  display: flex; flex-direction: column;
}
.p-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
}
.p-card:active { transform: scale(0.98); }

/* photo area */
.p-photo {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--cream);
}
.p-photo img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .5s cubic-bezier(.25,.46,.45,.94);
}
.p-card:hover .p-photo img { transform: scale(1.06); }

/* wishlist heart */
.p-heart {
  position: absolute; top: 10px; right: 10px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,253,249,0.9);
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
  opacity: 0; transition: opacity .2s;
}
.p-card:hover .p-heart { opacity: 1; }
.p-heart svg { width: 14px; height: 14px; stroke: var(--brown); fill: none; stroke-width: 2; }

/* info area */
.p-info {
  padding: 12px 12px 14px;
  flex: 1; display: flex; flex-direction: column; gap: 4px;
}
.p-name {
  font-size: 13px; font-weight: 700; color: var(--brown);
  line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.p-cat-label {
  font-size: 11px; font-weight: 600; color: var(--stone);
  letter-spacing: 0.04em;
}
.p-price {
  font-size: 14px; font-weight: 700; color: var(--terra);
  margin-top: 4px;
}
.p-price-empty { display: none; }

/* consult badge */
.p-consult {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 6px;
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--cream); border: 1px solid var(--sand);
  font-size: 10px; font-weight: 700; color: var(--brown);
  letter-spacing: 0.05em; text-transform: uppercase;
  text-decoration: none; transition: background .2s;
  align-self: flex-start;
}
.p-consult:hover { background: var(--sand); }
.p-consult svg { width: 10px; height: 10px; flex-shrink: 0; }

/* ── BOTTOM CTA ── */
.b-cta {
  margin: 36px 0 0;
  background: var(--brown);
  border-radius: 16px;
  padding: 36px 28px;
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; text-align: center;
}
.cta-t {
  font-family: var(--font-d);
  font-size: clamp(22px, 4vw, 32px); font-weight: 800; color: var(--cream);
}
.cta-t em { color: var(--terra-light); font-style: italic; }
.cta-s { font-size: 13px; color: var(--muted); }
.cta-wsp {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 32px;
  background: var(--terra); color: var(--white);
  font-family: var(--font-b); font-size: 13px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  text-decoration: none; border-radius: var(--radius-pill);
  transition: background .2s, transform .1s;
}
.cta-wsp:hover { background: var(--terra-light); }
.cta-wsp:active { transform: scale(0.97); }
.cta-wsp svg { width: 16px; height: 16px; flex-shrink: 0; }

@media (min-width: 700px) {
  .b-cta { flex-direction: row; text-align: left; justify-content: space-between; }
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(15,8,4,0.96);
  flex-direction: column; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lb-img-wrap {
  flex: 1; width: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 56px 12px 8px; overflow: hidden;
}
.lb-img-wrap img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; border-radius: 8px;
  animation: lbFade .2s ease;
}
@keyframes lbFade { from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)} }
.lb-bar {
  width: 100%; max-width: 600px;
  padding: 12px 20px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.lb-info { flex: 1; }
.lb-name { color: rgba(242,232,217,.92); font-size: 14px; font-weight: 600; }
.lb-sub  { color: rgba(242,232,217,.45); font-size: 11px; letter-spacing: .08em; margin-top: 2px; }
.lb-actions { display: flex; gap: 8px; }
.lb-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(242,232,217,.1); border: 1px solid rgba(242,232,217,.2);
  color: var(--cream); display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; transition: background .2s; flex-shrink: 0;
}
.lb-btn:hover { background: rgba(242,232,217,.22); }
.lb-close-x {
  position: absolute; top: 14px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(242,232,217,.12); border: none;
  color: var(--cream); font-size: 18px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}

/* ── FOOTER ── */
footer {
  background: var(--white);
  border-top: 1px solid var(--sand);
  padding: 24px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
}
.ft-logo { font-family: var(--font-d); font-size: 16px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--brown); }
.ft-logo span { color: var(--terra); }
.ft-meta { font-size: 10px; color: var(--muted); letter-spacing: .08em; }

/* ── SKELETON ── */
.skel-card {
  background: var(--white); border-radius: var(--radius-card);
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.skel-photo {
  aspect-ratio: 1/1;
  background: linear-gradient(90deg, var(--sand) 25%, var(--cream) 50%, var(--sand) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skel-info { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.skel-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--sand) 25%, var(--cream) 50%, var(--sand) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
</style>
</head>

<script>
// ═══════════════════════════════════════
//  ⚙️  CONFIGURACIÓN — editá aquí
// ═══════════════════════════════════════
const CFG = {
  ROOT_FOLDER_ID:  '1RtO9A-BwX7DNVYV29ou9auPaQpxmO-gs',
  WHATSAPP_NUMBER: 'REEMPLAZAR_CON_NUMERO',
  WHATSAPP_MSG:    encodeURIComponent('Hola! Vi el catálogo de Barda Home y quiero consultar sobre sus productos 🛋️'),
  GOOGLE_API_KEY:  'AIzaSyAxOuStvPAwQMelLxVfYPmHeS0GLZjg-Wk',
  CATEGORY_ORDER:  ['Mesas','Sillas','Juegos de comedor','Living - Sofás','Dormitorio','Deco - Accesorios','Exterior'],
  SHOW_PRICES:     false,   // cambiar a true si querés mostrar precios
};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let allItems=[], lbItems=[], lbIdx=0;

// ═══════════════════════════════════════
//  WHATSAPP
// ═══════════════════════════════════════
function wspURL(productName) {
  const n = CFG.WHATSAPP_NUMBER;
  if (n === '5492995276370') return '#';
  const msg = productName
    ? encodeURIComponent(`Hola! Vi "${productName}" en el catálogo de Barda Home y quiero consultar 🛋️`)
    : CFG.WHATSAPP_MSG;
  return `https://wa.me/${n}?text=${msg}`;
}
function setupWsp() { document.getElementById('wsp-top').href = wspURL(); }

// ═══════════════════════════════════════
//  DRIVE API
// ═══════════════════════════════════════
const gAPI = ep => `https://www.googleapis.com/drive/v3/${ep}&key=${CFG.GOOGLE_API_KEY}`;
async function apiFetch(u) { const r=await fetch(u); if(!r.ok) throw new Error(r.status); return r.json(); }

async function getFolders(pid) {
  const q = encodeURIComponent(`'${pid}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const d = await apiFetch(gAPI(`files?q=${q}&fields=files(id,name)&pageSize=50`));
  return d.files || [];
}
async function getImages(fid) {
  const q = encodeURIComponent(`'${fid}' in parents and mimeType contains 'image/' and trashed=false`);
  const d = await apiFetch(gAPI(`files?q=${q}&fields=files(id,name)&pageSize=200`));
  return d.files || [];
}
const thumb = id => `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
const full  = id => `https://lh3.googleusercontent.com/d/${id}`;

// clean filename → product name
function cleanName(filename) {
  return filename
    .replace(/\.[^.]+$/, '')          // remove extension
    .replace(/[-_]/g, ' ')            // dashes/underscores to spaces
    .replace(/\s+/g, ' ')             // collapse spaces
    .trim()
    .replace(/\b\w/g, c => c.toUpperCase()); // Title Case
}

// ═══════════════════════════════════════
//  LOAD CATALOG
// ═══════════════════════════════════════
async function loadCatalog() {
  setStatus('loading', 'Cargando catálogo...');
  showSkeletons();
  try {
    const folders = await getFolders(CFG.ROOT_FOLDER_ID);
    if (!folders.length) { setStatus('error','Sin carpetas. Verificá el ID y permisos.'); renderFallback(); return; }

    folders.sort((a,b) => {
      const oi=CFG.CATEGORY_ORDER.indexOf(a.name), oj=CFG.CATEGORY_ORDER.indexOf(b.name);
      if(oi===-1&&oj===-1) return a.name.localeCompare(b.name);
      if(oi===-1) return 1; if(oj===-1) return -1; return oi-oj;
    });

    buildNav(folders.map(f=>f.name));

    const results = await Promise.allSettled(
      folders.map(async f => ({ cat: f.name, imgs: await getImages(f.id) }))
    );

    let hasErr = false;
    results.forEach((r,i) => {
      if (r.status==='fulfilled') {
        r.value.imgs.forEach(img => allItems.push({
          id:   img.id,
          name: cleanName(img.name),
          raw:  img.name,
          cat:  r.value.cat
        }));
      } else { hasErr=true; console.warn('Folder err:',folders[i].name,r.reason); }
    });

    if (hasErr) document.getElementById('error-banner').style.display='block';
    document.getElementById('total-count').textContent = allItems.length;
    document.getElementById('cat-count').textContent   = [...new Set(allItems.map(i=>i.cat))].length;

    renderCatalog('all');
    setStatus('ok', `${allItems.length} producto${allItems.length!==1?'s':''} disponibles`);

  } catch(e) {
    console.error(e);
    setStatus('error','Error al conectar con Drive. Verificá la API Key.');
    document.getElementById('error-banner').style.display='block';
    renderFallback();
  }
}

// ═══════════════════════════════════════
//  NAV
// ═══════════════════════════════════════
function buildNav(cats) {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-pill'; b.dataset.filter = c; b.textContent = c;
    nav.appendChild(b);
  });
  // make first active
  if (nav.firstChild) nav.firstChild.classList.add('active');

  nav.querySelectorAll('.cat-pill').forEach(b => b.addEventListener('click', () => {
    nav.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    b.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
    renderCatalog(b.dataset.filter);
  }));
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════

function showSkeletons() {
  const main = document.getElementById('catalog');
  main.innerHTML = '';
  const sec = document.createElement('section');
  sec.className = 'cat-sec';
  sec.innerHTML = `<div class="sec-hdr"><div style="width:140px;height:22px;border-radius:6px;background:var(--sand)"></div></div><div class="prod-grid" id="skel-grid"></div>`;
  main.appendChild(sec);
  const grid = sec.querySelector('#skel-grid');
  for (let i=0;i<8;i++) {
    grid.innerHTML += `<div class="skel-card"><div class="skel-photo"></div><div class="skel-info"><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:50%"></div></div></div>`;
  }
}

function renderEmpty() {
  document.getElementById('catalog').innerHTML = `<div style="padding:60px 0;text-align:center;color:var(--stone)"><div style="font-family:var(--font-d);font-size:36px;font-weight:700;color:var(--sand);margin-bottom:10px">Barda Home</div><p style="font-size:11px;letter-spacing:.1em;text-transform:uppercase">Sin productos aún</p></div>`;
}
function renderFallback() {
  document.getElementById('catalog').innerHTML = `<div style="padding:48px 16px;text-align:center"><p style="font-size:13px;line-height:2.2;color:var(--stone)">Para activar el catálogo necesitás:<br><strong style="color:var(--brown)">1.</strong> API Key de Google Drive en <code>CFG.GOOGLE_API_KEY</code><br><strong style="color:var(--brown)">2.</strong> Carpetas de Drive compartidas como públicas</p></div>`;
}

// ═══════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════
function openLb(items, idx) {
  lbItems=items; lbIdx=idx; showLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function showLb() {
  const it = lbItems[lbIdx];
  document.getElementById('lb-img').src  = full(it.id);
  document.getElementById('lb-name').textContent = it.name;
  document.getElementById('lb-sub').textContent  = `${it.cat}  ·  ${lbIdx+1} / ${lbItems.length}`;
}
function closeLb() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }

// swipe
let tsX=0;
document.getElementById('lightbox').addEventListener('touchstart', e=>{tsX=e.touches[0].clientX;},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',   e=>{
  const dx=e.changedTouches[0].clientX-tsX;
  if(Math.abs(dx)>40){ lbIdx=dx<0?(lbIdx+1)%lbItems.length:(lbIdx-1+lbItems.length)%lbItems.length; showLb(); }
},{passive:true});

document.getElementById('lb-x').onclick    = closeLb;
document.getElementById('lb-prev').onclick = ()=>{ lbIdx=(lbIdx-1+lbItems.length)%lbItems.length; showLb(); };
document.getElementById('lb-next').onclick = ()=>{ lbIdx=(lbIdx+1)%lbItems.length; showLb(); };
document.getElementById('lightbox').onclick= e=>{ if(e.target===e.currentTarget) closeLb(); };
document.addEventListener('keydown', e=>{
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft')  { lbIdx=(lbIdx-1+lbItems.length)%lbItems.length; showLb(); }
  if(e.key==='ArrowRight') { lbIdx=(lbIdx+1)%lbItems.length; showLb(); }
});

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function setStatus(t,msg){ document.getElementById('sdot').className=`sdot ${t}`; document.getElementById('stext').textContent=msg; }
function slug(s){ return s.replace(/[^a-zA-Z0-9]/g,'_'); }

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
setupWsp();
loadCatalog();
</script>
